global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: splice-api
    metrics_path: /metrics
    authorization:
      type: Bearer
      credentials: local-only-observability-token-change-before-sharing
    static_configs:
      - targets: ["api:8080"]
